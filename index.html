<title>ClassifReg — Classification réglementaire</title>
<style>
  :root{--riph1:#c0392b;--riph2:#e67e22;--riph3:#27ae60;--re:#7c3aed;--rniph:#2980b9;--snds:#16a085;--none:#7f8c8d;--bg:#f0f2f5;--card:#fff;--primary:#1e3a5f;--text:#1e293b;--muted:#64748b}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:2rem 1rem}
  .app{max-width:680px;width:100%}
  .header{text-align:center;margin-bottom:2rem}
  .header h1{font-size:1.6rem;color:var(--primary);display:flex;align-items:center;justify-content:center;gap:.5rem}
  .header p{color:var(--muted);margin-top:.4rem;font-size:.95rem}
  .progress-bar{width:100%;height:6px;background:#dde1e7;border-radius:3px;margin-bottom:2rem;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#3b82f6);border-radius:3px;transition:width .4s ease}
  .card{background:var(--card);border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);padding:2rem;margin-bottom:1.5rem;animation:fadeIn .35s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .card h2{font-size:1.15rem;color:var(--primary);margin-bottom:.4rem}
  .card .subtitle{color:var(--muted);font-size:.88rem;margin-bottom:1.2rem}
  .step-badge{display:inline-block;background:var(--primary);color:#fff;font-size:.75rem;padding:2px 10px;border-radius:99px;margin-bottom:.8rem;font-weight:600}
  .options{display:flex;flex-direction:column;gap:.6rem}
  .opt-btn{display:block;width:100%;text-align:left;padding:.9rem 1.1rem;border:2px solid #e2e8f0;border-radius:10px;background:#fff;cursor:pointer;font-size:.95rem;color:var(--text);transition:all .2s;line-height:1.4}
  .opt-btn:hover{border-color:var(--primary);background:#f1f5f9}
  .opt-btn:active{transform:scale(.985)}
  .result-card{text-align:center;padding:2.5rem 2rem;border-radius:16px;color:#fff;animation:fadeIn .4s ease}
  .result-card .icon{font-size:2.8rem;margin-bottom:.6rem}
  .result-card h2{font-size:1.5rem;margin-bottom:.3rem;font-weight:700}
  .result-card .delai{display:inline-block;margin-top:.6rem;background:rgba(255,255,255,.2);padding:4px 16px;border-radius:99px;font-size:.9rem;font-weight:600}
  .result-card .detail{margin-top:1rem;font-size:.9rem;opacity:.9;line-height:1.5}
  .btn-restart{display:block;margin:1.5rem auto 0;padding:.7rem 2rem;border:2px solid rgba(255,255,255,.5);background:transparent;color:#fff;border-radius:10px;cursor:pointer;font-size:.95rem;font-weight:600;transition:all .2s}
  .btn-restart:hover{background:rgba(255,255,255,.15)}
  .back-link{display:inline-flex;align-items:center;gap:.3rem;color:var(--muted);font-size:.85rem;cursor:pointer;margin-bottom:1rem;border:none;background:none;transition:color .2s}
  .back-link:hover{color:var(--primary)}
  .save-status{margin-top:1rem;font-size:.85rem;padding:.5rem 1rem;border-radius:8px}
  .save-ok{background:rgba(255,255,255,.25)}
  .save-err{background:rgba(255,0,0,.2)}
  .chemin{margin-top:1.5rem;background:var(--card);border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:1.5rem}
  .chemin h3{font-size:.95rem;color:var(--primary);margin-bottom:.8rem}
  .chemin-step{display:flex;gap:.8rem;padding:.4rem 0;font-size:.85rem;border-bottom:1px solid #f1f5f9}
  .chemin-step:last-child{border-bottom:none}
  .chemin-q{color:var(--muted);min-width:140px}
  .chemin-a{font-weight:600;color:var(--text)}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:.4rem}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

function saveRow(data) {
  return fetch(WEBHOOK_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  }).then(function(response) {
    if (!response.ok) {
      console.error("Budibase webhook error: " + response.status + " " + response.statusText);
      return false;
    }
    return true;
  }).catch(function(err) {
    console.error("Budibase webhook network error:", err);
    return false;
  });
}

var historique=[];
var reponses={};
var maxDepth=7;

function render(id){
  var el=document.getElementById("content");
  if(R[id]){showResult(id);return;}
  var q=Q[id];if(!q)return;
  var step=historique.length+1;
  document.getElementById("progress").style.width=Math.min(100,(step/maxDepth)*100)+"%";
  var h="";
  if(historique.length) h+='<button class="back-link" onclick="goBack()">&#8592; Revenir</button>';
  h+='<div class="card"><span class="step-badge">Etape '+step+'</span>';
  h+='<h2>'+q.titre+'</h2><p class="subtitle">'+q.sous+'</p><div class="options">';
  for(var i=0;i<q.options.length;i++){h+='<button class="opt-btn" onclick="choose(\''+id+'\','+i+')">'+q.options[i].label+'</button>';}
  h+='</div></div>';
  el.innerHTML=h;
}

function choose(fromId,i){
  var q=Q[fromId];
  var opt=q.options[i];
  reponses[q.champ]=opt.value;
  historique.push(fromId);
  render(opt.next);
}

function goBack(){
  if(!historique.length)return;
  var prev=historique.pop();
  delete reponses[Q[prev].champ];
  render(prev);
}

function showResult(id){
  var r=R[id];
  document.getElementById("progress").style.width="100%";

  var record={};
  var keys=Object.keys(reponses);
  for(var k=0;k<keys.length;k++){record[keys[k]]=reponses[keys[k]];}
  record.resultat_id=id;
  record.resultat_classification=r.titre;
  record.resultat_categorie=r.cat;
  record.resultat_delai=r.delai||"";
  record.resultat_couleur=r.couleur;
  record.date_evaluation=new Date().toISOString();

  var h='<div class="result-card" style="background:'+r.couleur+'">';
  h+='<div class="icon">'+r.icon+'</div><h2>'+r.titre+'</h2>';
  h+='<p><strong>'+r.cat+'</strong></p>';
  if(r.delai) h+='<span class="delai">&#9201; Delai estime : '+r.delai+'</span>';
  h+='<p class="detail">'+r.detail+'</p>';
  h+='<div id="save-status-msg" class="save-status">&#8987; Enregistrement en cours...</div>';
  h+='<button class="btn-restart" onclick="restart()">&#128260; Recommencer</button>';
  h+='</div>';

  h+='<div class="chemin"><h3>&#129517; Chemin parcouru</h3>';
  var qKeys=Object.keys(reponses);
  for(var j=0;j<qKeys.length;j++){var champ=qKeys[j];var val=reponses[champ];var qLabel=champ;var allQ=Object.keys(Q);for(var m=0;m<allQ.length;m++){if(Q[allQ[m]].champ===champ){qLabel=Q[allQ[m]].titre;break;}}
h+='<div class="chemin-step"><span class="chemin-q">'+qLabel+'</span><span class="chemin-a">'+val+'</span></div>';
}
h+='</div>';

  document.getElementById("content").innerHTML=h;

  saveRow(record).then(function(ok){
    var el=document.getElementById("save-status-msg");
    if(el){
      if(ok){
        el.className="save-status save-ok";
        el.innerHTML="&#9989; Enregistre dans Budibase";
      }else{
        el.className="save-status save-err";
        el.innerHTML="&#9888; Erreur d'enregistrement (verifiez le webhook Budibase)";
      }
    }
  });
}

function restart(){historique=[];reponses={};render("q1");}
render("q1");
</script>
